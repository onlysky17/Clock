<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HL21A Command Session</title><style>:root{color-scheme:dark;font-family:system-ui}*{box-sizing:border-box}body{margin:0;background:#09111d;color:#eef4ff}main{max-width:1000px;margin:auto;padding:20px}.card{background:#121d2d;border:1px solid #30415d;border-radius:15px;padding:16px;margin:13px 0}.row{display:flex;flex-wrap:wrap;gap:8px}button{padding:10px 12px;border:1px solid #536b8f;border-radius:9px;background:#1b2a43;color:white;font-weight:700}button:disabled{opacity:.35}.good{background:#076047}.danger{background:#711d2c}.primary{background:#1d4ed8}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}.stat{background:#0a1422;border:1px solid #30415d;border-radius:10px;padding:10px}.stat span{display:block;color:#a8b6ca;font-size:.8rem}textarea{width:100%;min-height:300px;background:#050910;color:#cfe2ff;border:1px solid #30415d;border-radius:9px;padding:11px;font:12px/1.5 monospace}progress{width:100%;height:16px}code{color:#bdd7ff}</style></head><body><main><h1>HL21A — HINK213 2.13 Command Session</h1><p>E4 session 20 giây. E3 bị khóa khi chưa mở session. HL20A refresh lock vẫn luôn hoạt động.</p><section class="card"><h2>BLE</h2><div class="row"><button id="connect" class="primary">Connect</button><button id="disconnect" disabled>Disconnect</button><button id="clear">Clear log</button></div><p>BLE: <strong id="ble">Disconnected</strong></p></section><section class="card"><h2>Session</h2><div class="row"><button id="pre" disabled>Pre-open E3 reject</button><button id="open" class="good" disabled>Open session</button><button id="status" disabled>Status</button><button id="keep" disabled>Keepalive</button><button id="close" class="danger" disabled>Close</button><button id="timeoutTest" disabled>Open + timeout</button></div><div class="grid" style="margin-top:10px"><div class="stat"><span>Session</span><strong id="sess">CLOSED</strong></div><div class="stat"><span>Token</span><strong id="token">-</strong></div><div class="stat"><span>Timeout</span><strong id="tout">20 s</strong></div></div></section><section class="card"><h2>Regression</h2><div class="row"><button id="full" class="primary" disabled>Full 4736-byte E3 dry-run</button><button id="post" disabled>Post-close E3 reject</button><button id="lock" disabled>Check HL20A A1 + F0</button></div><div class="grid" style="margin-top:10px"><div class="stat"><span>Seq</span><strong id="seq">0</strong></div><div class="stat"><span>Bytes</span><strong id="bytes">0</strong></div><div class="stat"><span>XOR</span><strong id="xor">00</strong></div></div><progress id="prog" max="4736" value="0"></progress></section><section class="card"><h2>Log</h2><textarea id="log" readonly></textarea></section></main><script>'use strict';const S='18424398-7cbc-11e9-8f9e-2a86e4085a59',W='2d86686a-53dc-25b3-0c4a-f0e10c8dee20',WN='5a87b4ef-3bfa-76a8-e642-92933c31434f',N='15005991-b131-3396-014c-664c9867b917',TOTAL=4736,CHUNK=14;let d=null,g=null,w=null,n=null,p=null,tok=0,busy=false;const $=x=>document.getElementById(x),hx=a=>[...a].map(v=>v.toString(16).padStart(2,'0').toUpperCase()).join(' '),sleep=m=>new Promise(r=>setTimeout(r,m));function log(s){$('log').value+=new Date().toLocaleTimeString('vi-VN',{hour12:false})+' '+s+'\n';$('log').scrollTop=$('log').scrollHeight}function ui(){let c=!!g?.connected;$('ble').textContent=c?'Connected: '+(d?.name||'device'):'Disconnected';$('connect').disabled=c;$('disconnect').disabled=!c;for(let id of ['pre','open','status','keep','close','timeoutTest','post','lock'])$(id).disabled=!c||busy;$('full').disabled=!c||busy||!tok;$('sess').textContent=tok?'OPEN':'CLOSED';$('token').textContent=tok||'-'}function wait(pred,ms=1500){if(p)throw Error('ACK pending');return new Promise((res,rej)=>{let timer=setTimeout(()=>{p=null;rej(Error('ACK timeout'))},ms);p={pred,res,rej,timer}})}async function tx(a){log('TX: '+hx(a));if(w.properties?.writeWithoutResponse&&w.writeValueWithoutResponse)await w.writeValueWithoutResponse(a);else await w.writeValue(a)}async function req(a,pred,ms){let q=wait(pred,ms);try{await tx(a)}catch(e){if(p){clearTimeout(p.timer);p=null}throw e}return q}function notify(e){let a=new Uint8Array(e.target.value.buffer.slice(e.target.value.byteOffset,e.target.value.byteOffset+e.target.value.byteLength));log('RX: '+hx(a));if(p&&p.pred(a)){let q=p;p=null;clearTimeout(q.timer);q.res(a)}}async function connect(){d=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'EINK'},{namePrefix:'HINK'}],optionalServices:[S]});d.addEventListener('gattserverdisconnected',()=>{g=null;tok=0;ui();log('Disconnected')});g=await d.gatt.connect();let s=await g.getPrimaryService(S);try{w=await s.getCharacteristic(WN)}catch{w=await s.getCharacteristic(W)}n=await s.getCharacteristic(N);await n.startNotifications();n.addEventListener('characteristicvaluechanged',notify);ui();log('Connected')}const e4=(a,r)=>req(a,b=>b[0]===0xE4&&b[1]===r),e3=(a,r)=>req(a,b=>b[0]===0xE3&&b[1]===r),e2=s=>req(Uint8Array.of(0xE2,s,0,0,0,0,0),b=>b[0]===0xE2&&b[1]===s);async function openS(){let r=await e4(Uint8Array.of(0xE4,0,0x48,0x4C,0x32,0x31),0x80);if(r[2])throw Error('Open '+hx(r));tok=r[3];$('tout').textContent=r[4]+' s';ui();log('PASS open token='+tok)}async function keep(){let r=await e4(Uint8Array.of(0xE4,1,tok),0x81);if(r[2])throw Error('Keepalive '+hx(r));log('PASS keepalive')}async function closeS(){let r=await e4(Uint8Array.of(0xE4,2,tok),0x82);if(r[2])throw Error('Close '+hx(r));tok=0;ui();log('PASS close')}async function status(){let r=await e4(Uint8Array.of(0xE4,3),0x83);tok=r[2]?r[3]:0;ui();log('Status active='+r[2]+' token='+r[3])}const meta=()=>Uint8Array.of(0xE3,0,0x80,0,0x28,1,0x10,0x80,0x12);async function reject(label){let r=await e3(meta(),0x80);if(r[2]!==6)throw Error(label+' expected 06 got '+hx(r));log('PASS '+label+' E3 80 06')}function chunk(s,l){return Uint8Array.of(0xE3,1,s&255,(s>>8)&255,l,0,...new Uint8Array(l))}async function page(x){return(await e3(Uint8Array.of(0xE3,2,x),0x82))[2]}async function full(){let m=await e3(meta(),0x80);if(m[2])throw Error('Metadata '+hx(m));let s=0,o=0;while(o<TOTAL){let l=Math.min(CHUNK,TOTAL-o),r=await e3(chunk(s,l),0x81);if(r[2])throw Error('Chunk '+s+' '+hx(r));o+=l;s++;$('seq').textContent=s;$('bytes').textContent=o;$('prog').value=o;if(s%80===0)await keep();await sleep(12)}let sl=await page(0),sh=await page(1),bl=await page(2),bh=await page(3),x=await page(4),seq=sl|(sh<<8),bytes=bl|(bh<<8);$('xor').textContent=x.toString(16).padStart(2,'0').toUpperCase();if(seq!==339||bytes!==4736||x!==0)throw Error('Final mismatch');log('PASS COMPLETE 339 chunks 4736 bytes XOR 00')}async function timeoutTest(){if(tok)await closeS();await openS();log('Waiting 22 seconds...');await sleep(22000);tok=0;ui();await reject('timeout')}async function lock(){let a=await e2(0xE0);if(a[2]!==0xA1)throw Error('A1 fail');let b=await e2(3);if(b[2]!==0xF0)throw Error('F0 fail');log('PASS HL20A A1 + E2 03 F0')}async function safe(fn){try{busy=true;ui();await fn()}catch(e){log('ERROR '+e.message);alert(e.message)}finally{busy=false;ui()}}$('connect').onclick=()=>safe(connect);$('disconnect').onclick=()=>d?.gatt?.disconnect();$('clear').onclick=()=>{$('log').value=''};$('pre').onclick=()=>safe(()=>reject('pre-open'));$('open').onclick=()=>safe(openS);$('status').onclick=()=>safe(status);$('keep').onclick=()=>safe(keep);$('close').onclick=()=>safe(closeS);$('full').onclick=()=>safe(full);$('post').onclick=()=>safe(()=>reject('post-close'));$('timeoutTest').onclick=()=>safe(timeoutTest);$('lock').onclick=()=>safe(lock);ui();log('HL21A ready');</script></body></html>
