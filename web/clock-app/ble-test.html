<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EINK BLE Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; }
    button { font-size: 16px; padding: 12px 16px; margin: 6px 4px 6px 0; cursor: pointer; }
    textarea { width: 100%; height: 90px; margin-top: 12px; }
    .ok { color: green; }
    .bad { color: red; }
    .box { border: 1px solid #ddd; padding: 16px; border-radius: 10px; margin: 12px 0; }
  </style>
</head>
<body>
  <h1>EINK-VIET BLE Test</h1>

  <div class="box">
    <button onclick="connectBle()">Connect EINK-VIET</button>
    <button onclick="disconnectBle()">Disconnect</button>
    <p id="status">Chưa kết nối</p>
  </div>

  <div class="box">
    <button onclick="sendRefresh()">Refresh Clock E2</button>
    <button onclick="sendTime()">Set Time DD</button>
    <button onclick="sendTimeThenRefresh()">Set Time + Refresh</button>
  </div>

  <div class="box">
    <h3>Gửi HEX tự chọn</h3>
    <input id="hexInput" value="E2" style="width:100%;font-size:18px;padding:8px">
    <button onclick="sendCustomHex()">Send HEX</button>
  </div>

  <textarea id="log" readonly></textarea>

<script>
const CMD_SERVICE = "00001f10-0000-1000-8000-00805f9b34fb";
const CMD_CHAR    = "00001f1f-0000-1000-8000-00805f9b34fb";

let device = null;
let server = null;
let writeChar = null;

function log(msg) {
  const el = document.getElementById("log");
  el.value += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

function setStatus(msg, ok=false) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = ok ? "ok" : "bad";
}

async function connectBle() {
  try {
    log("Đang scan BLE...");
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: "EINK" }],
      optionalServices: [CMD_SERVICE]
    });

    device.addEventListener("gattserverdisconnected", () => {
      writeChar = null;
      setStatus("Đã ngắt kết nối");
      log("Disconnected");
    });

    log("Đang connect: " + device.name);
    server = await device.gatt.connect();

    const service = await server.getPrimaryService(CMD_SERVICE);
    writeChar = await service.getCharacteristic(CMD_CHAR);

    setStatus("Đã kết nối: " + device.name, true);
    log("Connected OK");
  } catch (err) {
    setStatus("Connect lỗi");
    log("ERROR connect: " + err);
  }
}

function disconnectBle() {
  if (device && device.gatt.connected) {
    device.gatt.disconnect();
  }
}

async function writeBytes(bytes) {
  if (!writeChar) {
    log("Chưa connect BLE");
    return;
  }

  const data = new Uint8Array(bytes);
  await writeChar.writeValue(data);
  log("Sent: " + [...data].map(x => x.toString(16).padStart(2, "0").toUpperCase()).join(" "));
}

async function sendRefresh() {
  await writeBytes([0xE2]);
}

async function sendTime() {
  const unix = Math.floor(Date.now() / 1000);

  // DD + Unix time big-endian
  const bytes = [
    0xDD,
    (unix >> 24) & 0xFF,
    (unix >> 16) & 0xFF,
    (unix >> 8) & 0xFF,
    unix & 0xFF
  ];

  await writeBytes(bytes);
}

async function sendTimeThenRefresh() {
  await sendTime();
  await new Promise(r => setTimeout(r, 300));
  await sendRefresh();
}

function parseHex(str) {
  return str
    .replace(/0x/gi, "")
    .replace(/[^0-9a-fA-F]/g, " ")
    .trim()
    .split(/\s+/)
    .filter(Boolean)
    .map(x => parseInt(x, 16));
}

async function sendCustomHex() {
  const hex = document.getElementById("hexInput").value;
  await writeBytes(parseHex(hex));
}
</script>
</body>
</html>
