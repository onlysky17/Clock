<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EINK Dev Panel</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; background:#101010; color:#eee; margin:0; padding:16px; }
    h1 { margin:0 0 12px; }
    section { border:1px solid #333; border-radius:10px; padding:12px; margin:12px 0; background:#181818; }
    button { margin:4px; padding:8px 12px; border:0; border-radius:6px; background:#1f6feb; color:white; cursor:pointer; }
    button.danger { background:#555; cursor:not-allowed; opacity:.45; }
    input { padding:8px; border-radius:6px; border:1px solid #444; background:#111; color:#eee; min-width:340px; }
    .muted { color:#aaa; font-size:13px; }
    .ok { color:#7CFC98; }
    .warn { color:#FFD166; }
    .bad { color:#FF6B6B; }
    .grid { display:grid; grid-template-columns:150px 1fr; gap:6px 12px; max-width:520px; }
    .logbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
    #log { background:#050505; border:1px solid #333; border-radius:8px; padding:10px; height:300px; overflow:auto; white-space:pre-wrap; font-family:Consolas, monospace; font-size:13px; }
  </style>
</head>
<body>
  <h1>EINK Dev Panel — HINK213 2.13</h1>

  <section>
    <h2>BLE</h2>
    <button onclick="connectBle()">Connect EINK/HINK</button>
    <button onclick="disconnectBle()">Disconnect</button>
    <button onclick="clearLog()">Clear log</button>
    <p class="muted">Dùng cho firmware HL14/HL16. Target thật: màn 2.13 HINK213.</p>
  </section>

  <section>
    <h2>Panel Info</h2>
    <div class="grid">
      <div>Device</div><b id="deviceName">-</b>
      <div>Driver</div><b id="driverName">-</b>
      <div>Width</div><b id="panelWidth">-</b>
      <div>Height</div><b id="panelHeight">-</b>
      <div>X bytes</div><b id="xBytes">-</b>
    </div>
    <button onclick="readPanelInfo()">Read Panel Info</button>
  </section>

  <section>
    <h2>Safe EPD Commands</h2>
    <button onclick="sendEpd('00')">EPD Ping</button>
    <button onclick="sendEpd('40')">GPIO Idle</button>
    <button onclick="sendEpd('41')">SPI Init</button>
    <button onclick="sendEpd('44')">Read BUSY</button>
    <button onclick="sendEpd('45')">Reset Pulse</button>
    <button onclick="sendEpd('42')">SPI Byte</button>
    <button onclick="sendEpd('43')">Soft Reset Byte</button>
    <button class="danger" disabled>Refresh locked</button>
    <p class="muted">Refresh/framebuffer đang khóa vì màn/FPC hiện tại không lành.</p>
  </section>

  <section>
    <h2>HEX thủ công</h2>
    <input id="hexInput" value="E2 D0 00 00 00 00 00" />
    <button onclick="sendCustomHex()">Send HEX via WRITE</button>
  </section>

  <section>
    <h2>Log</h2>
    <div class="logbar">
      <button onclick="clearLog()">Clear log</button>
      <button onclick="copyLog()">Copy log</button>
      <label><input id="decodedOnly" type="checkbox" checked /> Chỉ hiện decode</label>
    </div>
    <div id="log"></div>
  </section>

<script>
const HINK_SERVICE = "18424398-7cbc-11e9-8f9e-2a86e4085a59";
const WRITE_UUID   = "2d86686a-53dc-25b3-0c4a-f0e10c8dee20";
const NOTIFY_UUID  = "15005991-b131-3396-014c-664c9867b917";

let device = null;
let writeChar = null;
let notifyChar = null;

const panel = {
  driver: null,
  widthLow: null,
  widthHigh: null,
  heightLow: null,
  heightHigh: null,
  xBytes: null
};

function now() { return new Date().toLocaleTimeString(); }

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function decodedOnly() {
  const el = document.getElementById("decodedOnly");
  return !!(el && el.checked);
}

function log(msg, cls) {
  const el = document.getElementById("log");
  const line = `[${now()}] ${msg}\n`;
  el.innerHTML += cls ? `<span class="${cls}">${escapeHtml(line)}</span>` : escapeHtml(line);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById("log").innerHTML = "";
}

async function copyLog() {
  try {
    await navigator.clipboard.writeText(document.getElementById("log").innerText || "");
    log("Copied log", "ok");
  } catch (e) {
    log("COPY ERROR: " + e.message, "bad");
  }
}

function bytesToHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, "0").toUpperCase()).join(" ");
}

function parseHex(s) {
  const parts = s.trim().split(/\s+/).filter(Boolean);
  const out = [];
  for (const p of parts) {
    if (!/^[0-9a-fA-F]{1,2}$/.test(p)) throw new Error("HEX sai: " + p);
    out.push(parseInt(p, 16));
  }
  return new Uint8Array(out);
}

async function connectBle() {
  try {
    log("Scanning EINK/HINK...");
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: "EINK" }, { namePrefix: "HINK" }],
      optionalServices: [HINK_SERVICE]
    });

    device.addEventListener("gattserverdisconnected", () => log("Disconnected", "warn"));

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(HINK_SERVICE);
    writeChar = await service.getCharacteristic(WRITE_UUID);
    notifyChar = await service.getCharacteristic(NOTIFY_UUID);

    await notifyChar.startNotifications();
    notifyChar.addEventListener("characteristicvaluechanged", onNotify);

    document.getElementById("deviceName").textContent = device.name || "unknown";
    log("Connected: " + (device.name || "unknown"), "ok");
    log("Notify enabled", "ok");
  } catch (e) {
    log("CONNECT ERROR: " + e.message, "bad");
  }
}

function disconnectBle() {
  if (device && device.gatt.connected) device.gatt.disconnect();
}

async function writeBytes(bytes) {
  if (!writeChar) throw new Error("Chưa connect BLE");

  if (writeChar.writeValueWithResponse) {
    await writeChar.writeValueWithResponse(bytes);
  } else {
    await writeChar.writeValue(bytes);
  }

  if (!decodedOnly()) log("TX WRITE: " + bytesToHex(bytes));
}

async function sendEpd(subHex) {
  await writeBytes(parseHex("E2 " + subHex + " 00 00 00 00 00"));
}

async function readPanelInfo() {
  clearPanelInfo();
  for (const sub of ["D0", "D1", "D2", "D3", "D4", "D5"]) {
    await sendEpd(sub);
    await new Promise(r => setTimeout(r, 130));
  }
}

function clearPanelInfo() {
  panel.driver = panel.widthLow = panel.widthHigh = panel.heightLow = panel.heightHigh = panel.xBytes = null;
  document.getElementById("driverName").textContent = "-";
  document.getElementById("panelWidth").textContent = "-";
  document.getElementById("panelHeight").textContent = "-";
  document.getElementById("xBytes").textContent = "-";
}

async function sendCustomHex() {
  try {
    await writeBytes(parseHex(document.getElementById("hexInput").value));
  } catch (e) {
    log("HEX ERROR: " + e.message, "bad");
  }
}

function onNotify(ev) {
  const dv = ev.target.value;
  const bytes = new Uint8Array(dv.buffer, dv.byteOffset, dv.byteLength);
  const hex = bytesToHex(bytes);

  if (!decodedOnly()) log("NOTIFY ADC1: " + hex);

  const d = decodeNotify(bytes);
  if (d.text) log(d.text, d.cls);
}

function updatePanelSummary() {
  if (panel.driver !== null) {
    document.getElementById("driverName").textContent =
      panel.driver === 0x01 ? "HINK213 2.13 BW" : "ID 0x" + panel.driver.toString(16).padStart(2, "0").toUpperCase();
  }

  if (panel.widthLow !== null && panel.widthHigh !== null) {
    document.getElementById("panelWidth").textContent = String(panel.widthLow + (panel.widthHigh << 8));
  }

  if (panel.heightLow !== null && panel.heightHigh !== null) {
    document.getElementById("panelHeight").textContent = String(panel.heightLow + (panel.heightHigh << 8));
  }

  if (panel.xBytes !== null) {
    document.getElementById("xBytes").textContent = String(panel.xBytes);
  }
}

function decodeNotify(bytes) {
  if (!(bytes.length === 3 && bytes[0] === 0xE2)) return {};

  const sub = bytes[1];
  const st = bytes[2];

  if (sub === 0xD0) { panel.driver = st; updatePanelSummary(); return { text: "DECODE: Panel driver => " + (st === 1 ? "HINK213 2.13 BW" : "ID " + st), cls:"ok" }; }
  if (sub === 0xD1) { panel.widthLow = st; updatePanelSummary(); return { text: "DECODE: Width low => " + st, cls:"ok" }; }
  if (sub === 0xD2) { panel.widthHigh = st; updatePanelSummary(); return { text: "DECODE: Width high => " + st, cls:"ok" }; }
  if (sub === 0xD3) { panel.heightLow = st; updatePanelSummary(); return { text: "DECODE: Height low => " + st, cls:"ok" }; }
  if (sub === 0xD4) { panel.heightHigh = st; updatePanelSummary(); return { text: "DECODE: Height high => " + st, cls:"ok" }; }
  if (sub === 0xD5) { panel.xBytes = st; updatePanelSummary(); return { text: "DECODE: X bytes => " + st, cls:"ok" }; }

  const names = {
    0x00: "EPD parser",
    0x40: "GPIO idle",
    0x41: "SPI init",
    0x42: "SPI byte transfer",
    0x43: "Soft reset byte",
    0x44: "BUSY read",
    0x45: "Reset pulse"
  };

  const name = names[sub] || ("Subcmd 0x" + sub.toString(16).padStart(2, "0").toUpperCase());

  if (st === 0x02) return { text: "DECODE: " + name + " => OK", cls:"ok" };
  if (st === 0x00) return { text: "DECODE: " + name + " => BUSY LOW", cls:"ok" };
  if (st === 0x01) return { text: "DECODE: " + name + " => BUSY HIGH", cls:"warn" };
  if (st === 0x10) return { text: "DECODE: " + name + " => OK / BUSY LOW", cls:"ok" };
  if (st === 0x11) return { text: "DECODE: " + name + " => OK / BUSY HIGH", cls:"warn" };
  if (st === 0xEE) return { text: "DECODE: " + name + " => Unsupported", cls:"bad" };
  if (st === 0xF1) return { text: "DECODE: " + name + " => SPI TX stuck", cls:"bad" };
  if (st === 0xF2) return { text: "DECODE: " + name + " => SPI BUSY stuck", cls:"bad" };

  return { text: "DECODE: " + name + " => status 0x" + st.toString(16).padStart(2, "0").toUpperCase(), cls:"warn" };
}

log("EINK Dev Panel ready. Connect EINK-HL14/EINK-HL16.");
</script>
</body>
</html>
